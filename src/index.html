<!DOCTYPE html>
<html>

<head>
    <title>Music Trivia</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div id="modeSelect">
        <h2> Select Mode</h2>
        <button id="relaxBtn">😌 Relax Mode</button>
        <button id="stressBtn">😰 Stressful Mode (5 min)</button>
    </div>

    <div id="setupScreen" style="display:none;">
        <h2 id="setupTitle"></h2>

        <div id="questionOptions" style="display:none;">
            <p>How many questions would you like?</p>
            <button class="qBtn" data-q="5">5</button>
            <button class="qBtn" data-q="10">10</button>
            <button class="qBtn" data-q="15">15</button>
            <button class="qBtn" data-q="20">20</button>
            <button class="qBtn" data-q="25">25</button>
            <button class="qBtn" data-q="30">30</button>
            <button class="qBtn" data-q="35">35</button>
            <button class="qBtn" data-q="40">40</button>
            <button class="qBtn" data-q="45">45</button>
            <button class="qBtn" data-q="50">50</button>
        </div>

        <button id="startBtn">▶️ Start Quiz</button>
    </div>

    <p id="timer" style="display:none;"></p>

    <h1>🎵 Guess the Artist</h1>

    <p id="progress"></p>
    <p id="score"></p>
    <p id="streak"></p>

    <audio id="player"></audio>
    <audio id="endSound" controls></audio>

    <div id="answers"></div>
    <div id="resultsTable"></div>

    <p id="result"></p>

    <button id="restart">Restart Quiz</button>

    <script type="module" src="app.js"></script>

</body>

</html>
